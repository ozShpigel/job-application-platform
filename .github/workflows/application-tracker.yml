name: Application Tracker

on:
  push:
    branches: [main]
    paths: ['ApplicationTracker/**']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ApplicationTracker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/application-tracker:latest
