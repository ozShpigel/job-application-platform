name: Mailbot

on:
  push:
    branches: [main]
    paths:
      - 'Mailbot/**'
      - '.github/workflows/mailbot.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: mailbot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set image owner lowercase
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Mailbot/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:latest
      # No Render deploy hook: Render Cron Jobs pull the latest image on their
      # next scheduled run, so pushing to ghcr.io is enough to ship a new build.
