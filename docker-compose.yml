services:
  api:
    build:
      context: .
      dockerfile: server/api/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - MongoDB__ConnectionString=${MONGODB_CONNECTION_STRING}
      - MongoDB__ProfileDatabase=${JOBMATCH_MONGO_DB:-jobmatch}
      # Read-only scoring config & prompts (Options pattern). Optional overrides —
      # unset = appsettings.json "Scoring" / PromptSeeds.cs defaults. Examples:
      #   - Scoring__MinScoreToSave=75
      #   - Scoring__Evaluator__Temperature=0.6
      #   - Scoring__VerdictBands__Yes=55
      #   - Prompts__Analyzer=...   # full prompt text
      #   - Prompts__Evaluator=...  # full prompt text

  scraper:
    build:
      context: .
      dockerfile: server/scraper/Dockerfile
    ports:
      - "5137:8080"
    environment:
      - MONGODB_CONNECTION_STRING=${MONGODB_CONNECTION_STRING}
      - API_BASE_URL=http://api:8080

  mailbot:
    build:
      context: .
      dockerfile: server/mailbot/Dockerfile
    environment:
      - Tracker__BaseUrl=http://api:8080
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "3000:80"
