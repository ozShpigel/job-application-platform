<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מעקב משרות</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>מעקב משרות</h1>
            <p class="subtitle">ניהול ומעקב אחר תהליכי גיוס</p>
        </div>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab active" data-tab="dashboard">דשבורד</button>
            <button class="tab" data-tab="list">רשימת משרות</button>
            <button class="tab" data-tab="add">הוסף משרה</button>
            <button class="tab" data-tab="stats">סטטיסטיקות</button>
        </div>

        <!-- DASHBOARD -->
        <div id="tab-dashboard" class="tab-content active">
            <div id="summary-cards" class="summary-grid"></div>
            <div class="card">
                <h3 class="section-title">ראיונות קרובים</h3>
                <div id="upcoming-interviews"><p class="empty-state">טוען...</p></div>
            </div>
            <div class="card mt-1">
                <h3 class="section-title">פעילות אחרונה</h3>
                <div id="recent-activity"><p class="empty-state">טוען...</p></div>
            </div>
        </div>

        <!-- APPLICATION LIST -->
        <div id="tab-list" class="tab-content">
            <div class="card">
                <div class="list-header">
                    <span>תפקיד</span>
                    <span>חברה</span>
                    <span>סטטוס</span>
                    <span>ציון</span>
                    <span>תאריך</span>
                    <span class="list-header-actions" aria-hidden="true"></span>
                </div>
                <div id="app-list"><p class="empty-state">טוען...</p></div>
            </div>
        </div>

        <!-- ADD APPLICATION -->
        <div id="tab-add" class="tab-content">
            <div class="card">
                <h3 class="section-title">הוסף משרה חדשה</h3>
                <form id="add-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>שם התפקיד *</label>
                            <input type="text" id="add-title" required placeholder="Senior Backend Engineer">
                        </div>
                        <div class="form-group">
                            <label>חברה *</label>
                            <input type="text" id="add-company" required placeholder="שם החברה">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>סטטוס</label>
                            <select id="add-status"></select>
                        </div>
                        <div class="form-group">
                            <label>ציון התאמה</label>
                            <input type="number" id="add-score" min="0" max="100" placeholder="0-100">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>וורדיקט</label>
                        <input type="text" id="add-verdict" placeholder="STRONG_YES / YES / MAYBE / NO">
                    </div>
                    <div class="form-group">
                        <label>תיאור המשרה</label>
                        <textarea id="add-description" placeholder="הדבק את תיאור המשרה כאן..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">הוסף משרה</button>
                </form>
            </div>
        </div>

        <!-- STATISTICS -->
        <div id="tab-stats" class="tab-content">
            <div id="stats-summary" class="summary-grid"></div>
            <div class="card mt-1">
                <h3 class="section-title">התפלגות לפי סטטוס</h3>
                <div id="stats-breakdown" class="stat-bars"></div>
            </div>
        </div>

        <!-- APPLICATION DETAIL (hidden, shown via JS) -->
        <div id="tab-detail" class="tab-content">
            <span class="back-link" onclick="showTab('list')">← חזרה לרשימה</span>
            <div id="detail-content"></div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal" id="modal-content"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
