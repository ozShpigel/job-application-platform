server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 8.8.8.8 valid=30s;

    set $upstream_jms ${JOB_MATCH_SERVICE_URL};
    set $upstream_at ${APPLICATION_TRACKER_URL};
    set $upstream_jd ${JOB_DISCOVERY_URL};

    location /job-match/ {
        rewrite ^/job-match/(.*) /$1 break;
        proxy_pass $upstream_jms;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Redirect /applications to the tracker service directly
    location /applications/ {
        return 302 $upstream_at;
    }

    # JobMatchService API (prefix without trailing slash so /api/match matches the SPA fetch)
    location /api/match {
        proxy_pass $upstream_jms;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ApplicationTracker APIs
    location /api/applications {
        proxy_pass $upstream_at;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/stats {
        proxy_pass $upstream_at;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/interviews/ {
        proxy_pass $upstream_at;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/notes/ {
        proxy_pass $upstream_at;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # JobDiscovery API
    location /api/discovery {
        proxy_pass $upstream_jd;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
